<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بث الصوت</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06080f;
      --card: #0d1018;
      --border: #1a1f2e;
      --cyan: #00e5ff;
      --cyan2: #0095b3;
      --red: #ff4757;
      --text: #e8f0fe;
      --muted: #4a5270;
    }
    body {
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 65%);
      pointer-events: none;
    }
    .title { text-align: center; position: relative; z-index: 1; }
    .title h1 {
      font-size: 1.8rem; font-weight: 900; letter-spacing: 2px;
      color: var(--cyan);
      text-shadow: 0 0 30px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2);
    }
    .title p { margin-top: 6px; color: var(--muted); font-size: 0.88rem; }

    .card {
      position: relative; z-index: 1;
      width: min(460px, 95vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    canvas {
      display: block; border-radius: 50%;
      box-shadow: 0 0 40px rgba(0,229,255,0.1);
    }

    .delay-section { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .delay-label { display: flex; justify-content: space-between; align-items: center; }
    .delay-label span { font-size: 0.85rem; color: var(--muted); }
    .delay-label strong { font-size: 1.1rem; font-weight: 700; color: var(--cyan); text-shadow: 0 0 12px rgba(0,229,255,0.5); }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 10px rgba(0,229,255,0.6); cursor: pointer;
    }

    .meter-row { width: 100%; display: flex; align-items: center; gap: 12px; }
    .meter-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .meter-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .meter-fill {
      height: 100%; width: 0%; border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan2), var(--cyan));
      transition: width 0.05s;
    }

    .status-row { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .dot.rec  { background: var(--red);  box-shadow: 0 0 8px rgba(255,71,87,0.8);  animation: blink 1s infinite; }
    .dot.play { background: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.8);  animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hold-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .hold-btn {
      width: 140px; height: 140px; border-radius: 50%; border: none; cursor: pointer;
      font-family: 'Tajawal', sans-serif; font-weight: 700;
      color: #001a20;
      background: linear-gradient(135deg, #00c4e0, #0095b3);
      box-shadow: 0 6px 30px rgba(0,229,255,0.3);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      user-select: none; -webkit-user-select: none; touch-action: none;
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
    }
    .hold-btn .icon { font-size: 2.4rem; line-height: 1; }
    .hold-btn .lbl  { font-size: 0.8rem; letter-spacing: 0.4px; }
    .hold-btn.pressed {
      transform: scale(0.92);
      background: linear-gradient(135deg, #ff6b6b, #ff4757);
      color: #fff;
      box-shadow: 0 0 0 20px rgba(255,71,87,0.12), 0 0 60px rgba(255,71,87,0.3);
      animation: rpulse 1s ease-in-out infinite;
    }
    @keyframes rpulse {
      0%,100%{ box-shadow: 0 0 0 20px rgba(255,71,87,0.12), 0 0 60px rgba(255,71,87,0.3); }
      50%    { box-shadow: 0 0 0 32px rgba(255,71,87,0.04), 0 0 80px rgba(255,71,87,0.1); }
    }
    .hold-hint { font-size: 0.78rem; color: var(--muted); }
    .warning { font-size: 0.76rem; color: var(--muted); text-align: center; line-height: 1.6; }
    .warning b { color: rgba(0,229,255,0.5); }
  </style>
</head>
<body>

<div class="title">
  <h1>🎙 بث الصوت</h1>
  <p>اضغط مع الاستمرار للتسجيل — يُشغَّل بعد التأخير</p>
</div>

<div class="card">
  <canvas id="cv" width="200" height="200"></canvas>

  <div class="delay-section">
    <div class="delay-label">
      <span>⏱ التأخير</span>
      <strong id="dval">5 ثانية</strong>
    </div>
    <input type="range" id="dslider" min="0" max="10" step="0.5" value="5"/>
  </div>

  <div class="meter-row">
    <span class="meter-label">🎚 مستوى الصوت</span>
    <div class="meter-track"><div class="meter-fill" id="mfill"></div></div>
  </div>

  <div class="status-row">
    <div class="dot" id="sdot"></div>
    <span id="stxt">اضغط الزر للبدء</span>
  </div>

  <div class="hold-wrap">
    <button class="hold-btn" id="hbtn">
      <span class="icon" id="hicon">🎙</span>
      <span class="lbl"  id="hlbl">اضغط مع الاستمرار</span>
    </button>
    <span class="hold-hint">اضغط للتسجيل • اترك للتشغيل بعد التأخير</span>
  </div>

  <p class="warning">
    استخدم <b>سماعات أذن</b> لتجنب الصدى.<br/>
    افتح الملف في <b>Chrome</b> أو <b>Edge</b> مباشرةً.
  </p>
</div>

<script>
  const cv      = document.getElementById('cv');
  const ctx     = cv.getContext('2d');
  const dslider = document.getElementById('dslider');
  const dval    = document.getElementById('dval');
  const hbtn    = document.getElementById('hbtn');
  const hicon   = document.getElementById('hicon');
  const hlbl    = document.getElementById('hlbl');
  const sdot    = document.getElementById('sdot');
  const stxt    = document.getElementById('stxt');
  const mfill   = document.getElementById('mfill');

  let micStream  = null;
  let recorder   = null;
  let analyser   = null;
  let aCtx       = null;
  let chunks     = [];
  let pressing   = false;
  let vizId      = null;
  let meterTid   = null;

  // ── Slider ───────────────────────────────────────
  dslider.addEventListener('input', () => {
    const v = parseFloat(dslider.value);
    dval.textContent = v === 0 ? 'بدون تأخير' : `${v} ثانية`;
  });

  // ── Init mic (called once on first press) ────────
  async function initMic() {
    setStatus('⏳ طلب إذن المايكروفون...', '');
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      setStatus('❌ لم يُمنح إذن المايكروفون', '');
      micStream = null;
      return false;
    }

    aCtx     = new (window.AudioContext || window.webkitAudioContext)();
    analyser = aCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    aCtx.createMediaStreamSource(micStream).connect(analyser);

    startViz();
    startMeter();
    setStatus('🟢 جاهز — اضغط مع الاستمرار للكلام', '');
    return true;
  }

  // ── Press ON ─────────────────────────────────────
  async function pressOn(e) {
    e.preventDefault();
    if (pressing) return;

    if (!micStream) {
      const ok = await initMic();
      if (!ok) return;
    }

    pressing = true;
    chunks   = [];

    const mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4','']
                 .find(m => m === '' || MediaRecorder.isTypeSupported(m));

    recorder = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
    recorder.ondataavailable = ev => { if (ev.data && ev.data.size > 0) chunks.push(ev.data); };
    recorder.start(100);

    hbtn.classList.add('pressed');
    hicon.textContent = '🔴';
    hlbl.textContent  = 'يُسجّل...';
    setStatus('🎙 يُسجّل...', 'rec');
  }

  // ── Press OFF ────────────────────────────────────
  function pressOff(e) {
    if (e) e.preventDefault();
    if (!pressing || !recorder || recorder.state === 'inactive') return;
    pressing = false;

    hbtn.classList.remove('pressed');
    hicon.textContent = '🎙';

    recorder.stop();
    recorder.onstop = () => {
      if (!chunks.length) { setStatus('⚠️ لم يُسجَّل شيء', ''); hlbl.textContent = 'اضغط مع الاستمرار'; return; }

      const blob  = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
      const url   = URL.createObjectURL(blob);
      const delay = parseFloat(dslider.value) * 1000;

      if (delay > 0) {
        const sec = parseFloat(dslider.value);
        hlbl.textContent = `⏳ ${sec}ث`;
        setStatus(`⏳ يُشغَّل بعد ${sec} ثانية...`, 'play');
        setTimeout(() => playAudio(url), delay);
      } else {
        hlbl.textContent = 'اضغط مع الاستمرار';
        playAudio(url);
      }
    };
  }

  // ── Play audio blob ──────────────────────────────
  function playAudio(url) {
    const audio = new Audio(url);
    setStatus('🔊 يُشغّل الصوت...', 'play');
    hicon.textContent = '🔊';
    hlbl.textContent  = 'يُشغّل...';
    audio.play().catch(err => {
      setStatus('❌ خطأ في التشغيل', '');
      hlbl.textContent = 'اضغط مع الاستمرار';
      hicon.textContent = '🎙';
    });
    audio.onended = () => {
      URL.revokeObjectURL(url);
      setStatus('🟢 جاهز — اضغط مع الاستمرار للكلام', '');
      hlbl.textContent  = 'اضغط مع الاستمرار';
      hicon.textContent = '🎙';
    };
  }

  // ── Attach events ────────────────────────────────
  hbtn.addEventListener('mousedown',   pressOn,  { passive: false });
  hbtn.addEventListener('mouseup',     pressOff, { passive: false });
  hbtn.addEventListener('mouseleave',  pressOff, { passive: false });
  hbtn.addEventListener('touchstart',  pressOn,  { passive: false });
  hbtn.addEventListener('touchend',    pressOff, { passive: false });
  hbtn.addEventListener('touchcancel', pressOff, { passive: false });

  // ── Visualizer ───────────────────────────────────
  function startViz() {
    function draw() {
      vizId = requestAnimationFrame(draw);
      const W = cv.width, H = cv.height, cx = W/2, cy = H/2, R = 65;
      ctx.clearRect(0,0,W,H);

      ctx.beginPath(); ctx.arc(cx,cy,R+20,0,Math.PI*2);
      ctx.fillStyle = pressing ? 'rgba(255,71,87,0.05)' : 'rgba(0,229,255,0.03)';
      ctx.fill();

      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
      ctx.strokeStyle = pressing ? 'rgba(255,71,87,0.2)' : 'rgba(0,229,255,0.1)';
      ctx.lineWidth = 1; ctx.stroke();

      if (analyser) {
        const buf = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(buf);
        const N = Math.min(buf.length, 128);
        ctx.beginPath();
        for (let i = 0; i < N; i++) {
          const angle = (i/N)*Math.PI*2 - Math.PI/2;
          const amp   = (buf[Math.floor(i*buf.length/N)] - 128) / 128;
          const r     = R + amp*35;
          const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.closePath();
        const g = ctx.createLinearGradient(0,0,W,H);
        pressing ? (g.addColorStop(0,'#ff6b6b'), g.addColorStop(1,'#ff4757'))
                 : (g.addColorStop(0,'#00e5ff'), g.addColorStop(1,'#0077b6'));
        ctx.strokeStyle = g; ctx.lineWidth = 2.5;
        ctx.shadowColor = pressing ? '#ff4757' : '#00e5ff';
        ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0;
      }
    }
    draw();
  }

  function startMeter() {
    function tick() {
      meterTid = setTimeout(tick, 60);
      if (!analyser) return;
      const d = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(d);
      const avg = d.reduce((a,b)=>a+b,0)/d.length;
      mfill.style.width = Math.min(100, avg*2.5)+'%';
    }
    tick();
  }

  function setStatus(msg, cls) {
    stxt.textContent = msg;
    sdot.className = 'dot' + (cls ? ' '+cls : '');
  }

  // Idle canvas draw
  (function() {
    const W=cv.width, H=cv.height, cx=W/2, cy=H/2;
    ctx.beginPath(); ctx.arc(cx,cy,65,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,229,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
    ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🎙',cx,cy);
  })();
</script>
</body>
</html>
