<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بث الصوت المتأخر</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06080f;
      --card: #0d1018;
      --border: #1a1f2e;
      --cyan: #00e5ff;
      --cyan2: #0095b3;
      --red: #ff4757;
      --text: #e8f0fe;
      --muted: #4a5270;
      --glow-c: rgba(0, 229, 255, 0.15);
    }

    body {
      background: var(--bg);
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Title */
    .title {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .title h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 30px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2);
    }
    .title p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* Main visualizer card */
    .viz-card {
      position: relative;
      z-index: 1;
      width: min(500px, 95vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px 26px 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.05),
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    /* Circular waveform canvas */
    canvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(0,229,255,0.12);
    }

    /* Delay slider */
    .delay-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .delay-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delay-label span {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .delay-label strong {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0,229,255,0.5);
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px rgba(0,229,255,0.6);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* Volume meter */
    .meter-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meter-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .meter-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan2), var(--cyan));
      box-shadow: 0 0 8px rgba(0,229,255,0.4);
      transition: width 0.05s;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.active {
      background: var(--cyan);
      box-shadow: 0 0 8px rgba(0,229,255,0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot.recording {
      background: var(--red);
      box-shadow: 0 0 8px rgba(255,71,87,0.8);
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Hold button */
    .hold-btn-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .hold-btn {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #001a20;
      background: linear-gradient(135deg, #00c4e0, #0095b3);
      box-shadow: 0 0 0 0 rgba(0,229,255,0.4), 0 6px 30px rgba(0,229,255,0.25);
      transition: transform 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      position: relative;
      overflow: hidden;
    }
    .hold-btn .mic-icon { font-size: 2.2rem; line-height: 1; }
    .hold-btn .btn-label { font-size: 0.78rem; letter-spacing: 0.5px; }

    .hold-btn:not(:disabled):hover {
      box-shadow: 0 0 0 0 rgba(0,229,255,0.4), 0 8px 36px rgba(0,229,255,0.4);
    }
    .hold-btn.pressed {
      transform: scale(0.93);
      background: linear-gradient(135deg, #ff6b6b, #ff4757);
      color: #fff;
      box-shadow: 0 0 0 18px rgba(255,71,87,0.15), 0 0 60px rgba(255,71,87,0.3) !important;
      animation: holdPulse 1s ease-in-out infinite;
    }
    .hold-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    @keyframes holdPulse {
      0%,100% { box-shadow: 0 0 0 18px rgba(255,71,87,0.15), 0 0 60px rgba(255,71,87,0.3); }
      50%      { box-shadow: 0 0 0 28px rgba(255,71,87,0.05), 0 0 80px rgba(255,71,87,0.15); }
    }

    .hold-hint {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.4px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Warning */
    .warning {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      padding: 0 10px;
    }
    .warning b { color: rgba(0,229,255,0.6); }
  </style>
</head>
<body>

<div class="title">
  <h1>🎙 بث الصوت</h1>
  <p>يُسجّل صوتك ويُعيد بثه بعد التأخير</p>
</div>

<div class="viz-card">

  <!-- Canvas visualizer -->
  <canvas id="canvas" width="220" height="220"></canvas>

  <!-- Delay slider -->
  <div class="delay-section">
    <div class="delay-label">
      <span>⏱ التأخير الزمني</span>
      <strong id="delayVal">5 ثانية</strong>
    </div>
    <input type="range" id="delaySlider" min="0" max="10" step="0.5" value="5"/>
  </div>

  <!-- Volume meter -->
  <div class="meter-row">
    <span class="meter-label">🎚 الصوت</span>
    <div class="meter-track">
      <div class="meter-fill" id="meterFill"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">في انتظار بدء التشغيل</span>
  </div>

  <!-- Hold button -->
  <div class="hold-btn-wrap">
    <button class="hold-btn" id="holdBtn" disabled>
      <span class="mic-icon">🎙</span>
      <span class="btn-label" id="holdLabel">اضغط مع الاستمرار</span>
    </button>
    <span class="hold-hint">اضغط واستمر للكلام • اترك لإيقاف المايكروفون</span>
  </div>

  <p class="warning">
    سيطلب المتصفح الإذن للوصول إلى المايكروفون.<br/>
    استخدم <b>سماعات أذن</b> لتجنب الصدى (Echo).
  </p>
</div>

<script>
  // ── State ──────────────────────────────────────
  let audioCtx = null;
  let sourceNode = null;
  let delayNode = null;
  let gainNode = null;
  let analyserNode = null;
  let stream = null;
  let animId = null;
  let volumeId = null;
  let running = false;

  // ── UI refs ────────────────────────────────────
  const canvas      = document.getElementById('canvas');
  const ctx2d       = canvas.getContext('2d');
  const delaySlider = document.getElementById('delaySlider');
  const delayVal    = document.getElementById('delayVal');
  const startBtn    = document.getElementById('startBtn');
  const stopBtn     = document.getElementById('stopBtn');
  const statusDot   = document.getElementById('statusDot');
  const statusText  = document.getElementById('statusText');
  const meterFill   = document.getElementById('meterFill');

  // ── Slider live update ─────────────────────────
  delaySlider.addEventListener('input', () => {
    const v = parseFloat(delaySlider.value);
    delayVal.textContent = v === 0 ? 'بدون تأخير' : `${v} ثانية`;
    if (delayNode) delayNode.delayTime.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  });

  // ── Start ──────────────────────────────────────
  async function startStream() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
    } catch (e) {
      setStatus('❌ لم يُمنح إذن المايكروفون', false);
      return;
    }

    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    sourceNode = audioCtx.createMediaStreamSource(stream);

    // Delay
    const maxDelay = 11;
    delayNode = audioCtx.createDelay(maxDelay);
    delayNode.delayTime.value = parseFloat(delaySlider.value);

    // Gain
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1;

    // Analyser for visualizer
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 256;
    analyserNode.smoothingTimeConstant = 0.8;

    // Graph: mic → analyser → delay → gain → output
    sourceNode.connect(analyserNode);
    analyserNode.connect(delayNode);
    delayNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    running = true;
    startBtn.disabled = true;
    stopBtn.classList.add('visible');
    delaySlider.disabled = false;

    setStatus('🔴 يُسجّل ويبث...', true, true);
    drawVisualizer();
    updateMeter();
  }

  // ── Stop ───────────────────────────────────────
  function stopStream() {
    running = false;
    cancelAnimationFrame(animId);
    clearTimeout(volumeId);

    if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);

    setTimeout(() => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      stream = sourceNode = delayNode = gainNode = analyserNode = audioCtx = null;
    }, 200);

    startBtn.disabled = false;
    stopBtn.classList.remove('visible');
    meterFill.style.width = '0%';
    setStatus('⏹ توقف البث', false);
    clearCanvas();
  }

  // ── Circular waveform visualizer ───────────────
  function drawVisualizer() {
    if (!running) return;
    animId = requestAnimationFrame(drawVisualizer);

    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const R = 70;

    ctx2d.clearRect(0, 0, W, H);

    // Background circle
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, R + 22, 0, Math.PI * 2);
    ctx2d.fillStyle = 'rgba(0,229,255,0.03)';
    ctx2d.fill();

    // Center circle
    ctx2d.beginPath();
    ctx2d.arc(cx, cy, R - 8, 0, Math.PI * 2);
    ctx2d.strokeStyle = 'rgba(0,229,255,0.12)';
    ctx2d.lineWidth = 1;
    ctx2d.stroke();

    if (!analyserNode) return;

    const bufLen = analyserNode.frequencyBinCount;
    const data   = new Uint8Array(bufLen);
    analyserNode.getByteTimeDomainData(data);

    const slices = Math.min(bufLen, 128);
    const step   = Math.floor(bufLen / slices);

    ctx2d.beginPath();
    for (let i = 0; i < slices; i++) {
      const angle = (i / slices) * Math.PI * 2 - Math.PI / 2;
      const amp   = (data[i * step] - 128) / 128;
      const r     = R + amp * 38;
      const x     = cx + r * Math.cos(angle);
      const y     = cy + r * Math.sin(angle);
      i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    }
    ctx2d.closePath();

    // Gradient stroke
    const grad = ctx2d.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#00e5ff');
    grad.addColorStop(0.5, '#00b4d8');
    grad.addColorStop(1, '#0077b6');
    ctx2d.strokeStyle = grad;
    ctx2d.lineWidth = 2.5;
    ctx2d.shadowColor = '#00e5ff';
    ctx2d.shadowBlur = 10;
    ctx2d.stroke();
    ctx2d.shadowBlur = 0;

    // Mic icon in center
    ctx2d.font = '28px serif';
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillText('🎙', cx, cy);
  }

  // ── Volume meter ───────────────────────────────
  function updateMeter() {
    if (!running || !analyserNode) return;
    const data = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    meterFill.style.width = Math.min(100, avg * 2.2) + '%';
    volumeId = setTimeout(updateMeter, 60);
  }

  function clearCanvas() {
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    ctx2d.beginPath();
    ctx2d.arc(canvas.width/2, canvas.height/2, 70, 0, Math.PI*2);
    ctx2d.strokeStyle = 'rgba(0,229,255,0.08)';
    ctx2d.lineWidth = 1;
    ctx2d.stroke();
    ctx2d.font = '32px serif';
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillText('🎙', canvas.width/2, canvas.height/2);
  }

  function setStatus(msg, active = false, rec = false) {
    statusText.textContent = msg;
    statusDot.className = 'dot' + (active ? (rec ? ' recording' : ' active') : '');
  }

  // Init canvas
  clearCanvas();
</script>
</body>
</html>
